<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <link rel="stylesheet" href="style4.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    
    <nav class="navbar">
        <div class="nav-container">
            <img src="https://www.logo.wine/a/logo/Instagram/Instagram-Wordmark-Black-Logo.wine.svg" class="logo" alt="Instagram">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search">
            </div>
            <div class="nav-icons">
                <i class="fas fa-home"></i>
                <i class="fab fa-facebook-messenger"></i>
                <i class="far fa-plus-square"></i>
                <i class="far fa-compass"></i>
                <i class="far fa-heart"></i>
                <img src="https://i.pravatar.cc/150?u=me" class="user-pfp" alt="profile">
            </div>
        </div>
    </nav>

    <main class="main-content">
        <section class="feed">
            <div class="stories">
                <div class="story-item">
                    <div class="story-circle"><img src="https://i.pravatar.cc/150?u=1"></div>
                    <p>user_1</p>
                </div>
                <div class="story-item">
                    <div class="story-circle"><img src="https://i.pravatar.cc/150?u=2"></div>
                    <p>traveler</p>
                </div>
                </div>

            <div id="post-container">
                </div>
        </section>

        <aside class="sidebar">
            <div class="side-user">
                <img src="https://i.pravatar.cc/150?u=me" alt="me">
                <div>
                    <p class="username">your_username</p>
                    <p class="fullname">Your Name</p>
                </div>
                <button class="switch-btn">Switch</button>
            </div>
            <div class="suggestions">
                <p>Suggestions For You</p>
                <button>See All</button>
            </div>
        </aside>
    </main>

    <script src="script4.js"></script>
</body>
</html>
