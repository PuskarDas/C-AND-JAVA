<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." spellcheck="false">
            <button id="searchBtn">Search</button>
        </div>

        <div class="weather-card" id="weatherContent" style="display: none;">
            <h2 id="cityName">London, UK</h2>
            <p id="dateTime">Thursday, 15 Jan</p>
            
            <div class="main-info">
                <img id="weatherIcon" src="" alt="Weather Icon">
                <h1 id="temp">22°C</h1>
                <p id="condition">Partly Cloudy</p>
            </div>

            <div class="details">
                <div class="col">
                    <p>Humidity</p>
                    <span id="humidity">45%</span>
                </div>
                <div class="col">
                    <p>Wind Speed</p>
                    <span id="wind">12 km/h</span>
                </div>
                <div class="col">
                    <p>Air Quality (AQI)</p>
                    <span id="aqi">Good (1)</span>
                </div>
            </div>
        </div>

        <div id="error" class="error-msg">City not found. Please try again.</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
